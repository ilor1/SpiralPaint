<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spiral Paint by Ilori</title>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; touch-action: manipulation; }

        /* The container keeps things in a row on Desktop, stacks on Mobile */
        .main-container { display: flex; gap: 20px; align-items: flex-start; justify-content: center; }

        @media (max-width: 1200px) {
            .main-container { flex-direction: column; align-items: center; }
        }

        .canvas-column { display: flex; flex-direction: column; gap: 10px; width: 716px; }

        .top-toolbar {
            background-color: #2c2c2c; padding: 10px; border-radius: 8px;
            display: flex; gap: 10px; flex-wrap: wrap;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); justify-content: center;
            width: 100%; box-sizing: border-box;
        }

        .side-toolbar {
            background-color: #2c2c2c; padding: 15px; border-radius: 8px;
            display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); width: 150px;
        }

        .canvas-wrapper {
            position: relative; width: 700px; height: 700px;
            background-color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden; touch-action: none; border: 8px solid #333; cursor: crosshair;
        }
        .canvas-rotator {
            position: absolute; top: 50%; left: 50%; width: 1450px; height: 1450px; will-change: transform;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;}
        #spiralLayer { z-index: 999; }

        .layer-panel {
            background: #2c2c2c; padding: 15px; border-radius: 8px; width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .layer-item {
            padding: 8px; margin-bottom: 5px; background: #3d3d3d; border-radius: 4px;
            cursor: grab; border: 2px solid transparent; display: flex; align-items: center; gap: 10px;
            user-select: none;
        }
        .layer-item.active { border-color: #FF3366; }

        .delete-btn { background: #ff5555; border: none; color: white; cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-left: auto; }

        #brushCursor {
            position: fixed; border: 1px solid rgba(130, 130, 130, 1);
            border-radius: 50%; pointer-events: none; display: none;
            z-index: 1000; transform: translate(-50%, -50%);
        }

        @media (pointer: coarse) { #brushCursor { display: none !important; } }
        footer { margin-top: 25px; color: #888; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div id="brushCursor"></div>

<div class="main-container">
    <div class="side-toolbar">
        <strong>Brush</strong>
        <label>Color</label>
        <input type="color" id="paintColor" value="#FF3366">
        <label>Size</label>
        <input type="range" id="brushSize" min="2" max="75" value="15" oninput="updateCursor()">
    </div>

    <div class="canvas-column">
        <div class="top-toolbar">
            <button onclick="generateRandomSpiral();">New Spiral</button>
            <label><input type="checkbox" id="showSpiral" checked onchange="toggleSpiral()"> Show Spiral</label>
            <label>Rotation</label>
            <input type="range" id="rotationSpeed" min="-15" max="15" step="0.05" value="-0.15">
            <button onclick="clearActiveLayer()" style="background-color: #ff5555; color: white;">Clear</button>
            <button onclick="exportCanvas()" style="background-color: #4CAF50; color: white;">Export</button>
        </div>

        <div class="canvas-wrapper" id="canvasWrapper">
            <div class="canvas-rotator" id="canvasRotator">
                <canvas id="spiralLayer" width="1024" height="1024"></canvas>
            </div>
        </div>
    </div>

    <div class="layer-panel" id="layerPanel">
        <strong>Layers</strong>
        <button onclick="addLayer()" style="width: 100%; margin-top: 10px;">+ Add Layer</button>
        <div id="layerList" style="margin-top: 10px;"></div>
    </div>
</div>

<footer>&copy; ilori 2026</footer>

<script>
    const wrapper = document.getElementById('canvasWrapper');
    const rotator = document.getElementById('canvasRotator');
    const sCtx = document.getElementById('spiralLayer').getContext('2d');
    const cursor = document.getElementById('brushCursor');
    const brushInput = document.getElementById('brushSize');
    const layerList = document.getElementById('layerList');

    let layers = [];
    let activeLayerIndex = 0;
    const textureSize = 1024;
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let currentRotation = 0;

    function paintAt(currentX, currentY) {
        const layer = layers[activeLayerIndex];
        if (!layer || !layer.visible) return;
        const ctx = layer.ctx;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.strokeStyle = document.getElementById('paintColor').value;
        ctx.lineWidth = parseFloat(brushInput.value) * 2;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(currentX, currentY);
        ctx.stroke();
        lastX = currentX; lastY = currentY;
    }

    function addLayer() {
        const canvas = document.createElement('canvas');
        canvas.width = textureSize; canvas.height = textureSize;
        rotator.appendChild(canvas);
        layers.push({ canvas, ctx: canvas.getContext('2d'), name: `Layer ${layers.length + 1}`, visible: true });
        activeLayerIndex = layers.length - 1;
        renderLayerUI();
    }

    function renderLayerUI() {
        layerList.innerHTML = '';
        for (let i = layers.length - 1; i >= 0; i--) {
            const layer = layers[i];
            const div = document.createElement('div');
            div.className = `layer-item ${i === activeLayerIndex ? 'active' : ''}`;
            div.onclick = () => { activeLayerIndex = i; renderLayerUI(); };

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox'; checkbox.checked = layer.visible;
            checkbox.onchange = (e) => { layer.visible = e.target.checked; layer.canvas.style.display = layer.visible ? 'block' : 'none'; };

            const delBtn = document.createElement('button');
            delBtn.innerHTML = '🗑️'; delBtn.className = 'delete-btn';
            delBtn.onclick = (e) => { e.stopPropagation(); rotator.removeChild(layer.canvas); layers.splice(i, 1); if(activeLayerIndex >= layers.length) activeLayerIndex = layers.length-1; renderLayerUI(); };

            div.appendChild(checkbox);
            div.appendChild(document.createTextNode(layer.name));
            div.appendChild(delBtn);
            layerList.appendChild(div);
        }
    }

    wrapper.addEventListener('wheel', (e) => { e.preventDefault(); brushInput.value = Math.max(5, Math.min(100, parseInt(brushInput.value) + (e.deltaY < 0 ? 5 : -5))); updateCursor(); }, { passive: false });

    function toggleSpiral() { document.getElementById('spiralLayer').style.display = document.getElementById('showSpiral').checked ? 'block' : 'none'; }

    function updateCursor() { const size = brushInput.value; cursor.style.width = size * 2 + 'px'; cursor.style.height = size * 2 + 'px'; }

    wrapper.addEventListener('mouseenter', () => cursor.style.display = 'block');
    wrapper.addEventListener('mouseleave', () => cursor.style.display = 'none');
    window.addEventListener('mousemove', (e) => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });

    function exportCanvas() {
        const temp = document.createElement('canvas'); temp.width = textureSize; temp.height = textureSize;
        const ctx = temp.getContext('2d'); ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, textureSize, textureSize);
        layers.forEach(l => { if(l.visible) ctx.drawImage(l.canvas, 0, 0); });
        if(document.getElementById('showSpiral').checked) ctx.drawImage(document.getElementById('spiralLayer'), 0, 0);
        const a = document.createElement('a'); a.download = 'art.png'; a.href = temp.toDataURL('image/png'); a.click();
    }

    function generateRandomSpiral() {
        sCtx.clearRect(0, 0, textureSize, textureSize);
        const center = textureSize / 2, tightness = Math.random() * 10 + 15, numArms = Math.floor(Math.random() * 4) + 1;
        sCtx.lineWidth = 6; sCtx.strokeStyle = '#000000'; sCtx.lineCap = 'round';
        for (let arm = 0; arm < numArms; arm++) {
            sCtx.beginPath();
            const offset = (Math.PI * 2 / numArms) * arm;
            for (let t = 0; t < 60; t += 0.1) {
                let r = tightness * t;
                let x = center + r * Math.cos(t + offset), y = center + r * Math.sin(t + offset);
                t === 0 ? sCtx.moveTo(x, y) : sCtx.lineTo(x, y);
            }
            sCtx.stroke();
        }
    }

    function getCoords(clientX, clientY) {
        const rect = wrapper.getBoundingClientRect();
        const dx = clientX - (rect.left + rect.width / 2);
        const dy = clientY - (rect.top + rect.height / 2);
        const rad = -currentRotation * (Math.PI / 180);
        const rx = dx * Math.cos(rad) - dy * Math.sin(rad);
        const ry = dx * Math.sin(rad) + dy * Math.cos(rad);
        return { x: (rx + (rect.width/2)) * (textureSize / rect.width), y: (ry + (rect.height/2)) * (textureSize / rect.height) };
    }

    wrapper.addEventListener('pointerdown', (e) => {
        isDrawing = true; wrapper.setPointerCapture(e.pointerId);
        const coords = getCoords(e.clientX, e.clientY);
        lastX = coords.x; lastY = coords.y;
    });
    wrapper.addEventListener('pointermove', (e) => {
        if(isDrawing) { const coords = getCoords(e.clientX, e.clientY); paintAt(coords.x, coords.y); }
    });
    wrapper.addEventListener('pointerup', () => isDrawing = false);

    function animate() {
        currentRotation += parseFloat(document.getElementById('rotationSpeed').value);
        rotator.style.transform = `translate(-50%, -50%) rotate(${currentRotation}deg)`;
        requestAnimationFrame(animate);
    }

    updateCursor(); requestAnimationFrame(animate); generateRandomSpiral(); addLayer();
</script>
</body>
</html>
