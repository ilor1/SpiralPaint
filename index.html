<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spiral Paint by Ilori</title>
    <style>
        :root { --bg: #1a1a1a; --panel: #2c2c2c; --accent: #FF3366; }
        body { background-color: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        .main-container { display: grid; gap: 15px; width: 100%; max-width: 1100px; grid-template-columns: 1fr; }
        @media (min-width: 900px) { .main-container { grid-template-columns: 200px 1fr 200px; } }

        .panel { background: var(--panel); padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .canvas-column { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .top-toolbar { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 10px; background: var(--panel); border-radius: 8px; }

        .canvas-wrapper {
            position: relative; width: 100%; aspect-ratio: 1 / 1;
            background: white; border: 8px solid #333; overflow: hidden;
            touch-action: none; cursor: crosshair; box-sizing: border-box;
        }

        .canvas-rotator {
            position: absolute; top: 50%; left: 50%;
            width: 142%; height: 142%;
            transform: translate(-50%, -50%);
            will-change: transform;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;}
        #spiralLayer { z-index: 999; }

        .layer-item {
            display: flex; align-items: center; gap: 5px; padding: 8px 5px;
            margin-bottom: 5px; background: #3d3d3d; border-radius: 4px;
            font-size: 13px; cursor: grab; min-height: 35px;
        }
        .layer-item.active { border: 2px solid var(--accent); }

        /* Number display styling - takes minimal space */
        .layer-number { min-width: 20px; font-weight: bold; text-align: center; }

        .button-group { display: flex; gap: 2px; flex-shrink: 0; }

        button { padding: 6px 8px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .delete-btn { background: #ff5555; color: white; padding: 6px 8px; }
        .nav-btn { background: #555; color: white; padding: 6px 8px; }

        #paintColor { width: 100%; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="panel">
        <strong>Brush</strong>
        <input type="color" id="paintColor" value="#FF3366">
        <label style="font-size: 0.8em; margin-top:10px; display:block;">Size</label>
        <input type="range" id="brushSize" min="2" max="75" value="15" style="width:100%">
    </div>

    <div class="canvas-column">
        <div class="top-toolbar">
            <button onclick="generateRandomSpiral();">New</button>
            <label style="display:flex; align-items:center;"><input type="checkbox" id="showSpiral" checked onchange="toggleSpiral()"> Show</label>
            <input type="range" id="rotationSpeed" min="-15" max="15" step="0.05" value="-0.15" style="width: 80px;">
            <button onclick="clearActiveLayer()" style="background-color: #ff5555; color: white;">Clear</button>
            <button onclick="exportCanvas()" style="background-color: #4CAF50; color: white;">Export</button>
        </div>

        <div class="canvas-wrapper" id="canvasWrapper">
            <div class="canvas-rotator" id="canvasRotator">
                <canvas id="spiralLayer" width="1024" height="1024"></canvas>
            </div>
        </div>
    </div>

    <div class="panel">
        <strong>Layers</strong>
        <button onclick="addLayer()" style="width: 100%; margin-top: 10px;">+ Add Layer</button>
        <div id="layerList" style="margin-top: 10px;"></div>
    </div>
</div>

<script>
    const wrapper = document.getElementById('canvasWrapper');
    const rotator = document.getElementById('canvasRotator');
    const sCtx = document.getElementById('spiralLayer').getContext('2d');
    const brushInput = document.getElementById('brushSize');
    const layerList = document.getElementById('layerList');

    let layers = [];
    let activeLayerIndex = 0;
    const textureSize = 1024;
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let currentRotation = 0;

    function paintAt(currentX, currentY) {
        const layer = layers[activeLayerIndex];
        if (!layer || !layer.visible) return;
        const ctx = layer.ctx;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.strokeStyle = document.getElementById('paintColor').value;
        ctx.lineWidth = parseFloat(brushInput.value) * 2;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(currentX, currentY);
        ctx.stroke();
        lastX = currentX; lastY = currentY;
    }

    function addLayer() {
        const canvas = document.createElement('canvas');
        canvas.width = textureSize; canvas.height = textureSize;
        rotator.appendChild(canvas);
        // We no longer need to store a "name" property
        layers.push({ canvas, ctx: canvas.getContext('2d'), visible: true });
        activeLayerIndex = layers.length - 1;
        renderLayerUI();
    }

    function moveLayer(index, direction) {
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= layers.length) return;
        const temp = layers[index];
        layers[index] = layers[newIndex];
        layers[newIndex] = temp;
        activeLayerIndex = newIndex;
        renderLayerUI();
    }

    function renderLayerUI() {
        layerList.innerHTML = '';
        // Render from top to bottom
        for (let i = layers.length - 1; i >= 0; i--) {
            const layer = layers[i];
            const div = document.createElement('div');
            div.className = `layer-item ${i === activeLayerIndex ? 'active' : ''}`;
            div.draggable = true;
            div.onclick = () => { activeLayerIndex = i; renderLayerUI(); };

            // Drag and Drop logic
            div.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', i));
            div.addEventListener('dragover', (e) => e.preventDefault());
            div.addEventListener('drop', (e) => {
                const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                const toIndex = i;
                const item = layers.splice(fromIndex, 1)[0];
                layers.splice(toIndex, 0, item);
                activeLayerIndex = toIndex;
                renderLayerUI();
            });

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox'; checkbox.checked = layer.visible;
            checkbox.onchange = (e) => { layer.visible = e.target.checked; layer.canvas.style.display = layer.visible ? 'block' : 'none'; };

            // Simple number label (i+1 is the display number)
            const numberSpan = document.createElement('span');
            numberSpan.className = 'layer-number';
            numberSpan.textContent = (i + 1);

            const btnGroup = document.createElement('div');
            btnGroup.className = 'button-group';

            const upBtn = document.createElement('button'); upBtn.innerHTML = '▲'; upBtn.className = 'nav-btn';
            upBtn.onclick = (e) => { e.stopPropagation(); moveLayer(i, 1); };
            const downBtn = document.createElement('button'); downBtn.innerHTML = '▼'; downBtn.className = 'nav-btn';
            downBtn.onclick = (e) => { e.stopPropagation(); moveLayer(i, -1); };
            const delBtn = document.createElement('button');
            delBtn.innerHTML = '🗑️'; delBtn.className = 'delete-btn';
            delBtn.onclick = (e) => { e.stopPropagation(); rotator.removeChild(layer.canvas); layers.splice(i, 1); if(activeLayerIndex >= layers.length) activeLayerIndex = Math.max(0, layers.length-1); renderLayerUI(); };

            btnGroup.appendChild(upBtn);
            btnGroup.appendChild(downBtn);
            btnGroup.appendChild(delBtn);

            div.appendChild(checkbox);
            div.appendChild(numberSpan);
            div.appendChild(btnGroup);
            layerList.appendChild(div);
        }

        layers.forEach((l, idx) => l.canvas.style.zIndex = idx);
    }

    function clearActiveLayer() {
        if(layers[activeLayerIndex]) {
            layers[activeLayerIndex].ctx.clearRect(0, 0, textureSize, textureSize);
        }
    }

    function toggleSpiral() { document.getElementById('spiralLayer').style.display = document.getElementById('showSpiral').checked ? 'block' : 'none'; }

    function exportCanvas() {
        const temp = document.createElement('canvas'); temp.width = textureSize; temp.height = textureSize;
        const ctx = temp.getContext('2d'); ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, textureSize, textureSize);
        layers.forEach(l => { if(l.visible) ctx.drawImage(l.canvas, 0, 0); });
        if(document.getElementById('showSpiral').checked) ctx.drawImage(document.getElementById('spiralLayer'), 0, 0);
        const a = document.createElement('a'); a.download = 'art.png'; a.href = temp.toDataURL('image/png'); a.click();
    }

    function generateRandomSpiral() {
        sCtx.clearRect(0, 0, textureSize, textureSize);
        const center = textureSize / 2, tightness = Math.random() * 10 + 15, numArms = Math.floor(Math.random() * 4) + 1;
        sCtx.lineWidth = 6; sCtx.strokeStyle = '#000000'; sCtx.lineCap = 'round';
        for (let arm = 0; arm < numArms; arm++) {
            sCtx.beginPath();
            const offset = (Math.PI * 2 / numArms) * arm;
            for (let t = 0; t < 60; t += 0.1) {
                let r = tightness * t;
                let x = center + r * Math.cos(t + offset), y = center + r * Math.sin(t + offset);
                t === 0 ? sCtx.moveTo(x, y) : sCtx.lineTo(x, y);
            }
            sCtx.stroke();
        }
    }

    function getCoords(clientX, clientY) {
        const rect = wrapper.getBoundingClientRect();
        const dx = clientX - (rect.left + rect.width / 2);
        const dy = clientY - (rect.top + rect.height / 2);
        const rad = -currentRotation * (Math.PI / 180);
        const rx = dx * Math.cos(rad) - dy * Math.sin(rad);
        const ry = dx * Math.sin(rad) + dy * Math.cos(rad);
        const scale = textureSize / (rect.width * 1.42);
        return { x: (rx * scale) + (textureSize / 2), y: (ry * scale) + (textureSize / 2) };
    }

    wrapper.addEventListener('pointerdown', (e) => {
        isDrawing = true; wrapper.setPointerCapture(e.pointerId);
        const coords = getCoords(e.clientX, e.clientY);
        lastX = coords.x; lastY = coords.y;
    });
    wrapper.addEventListener('pointermove', (e) => {
        if(isDrawing) {
            const coords = getCoords(e.clientX, e.clientY);
            paintAt(coords.x, coords.y);
        }
    });
    wrapper.addEventListener('pointerup', () => isDrawing = false);

    function animate() {
        currentRotation += parseFloat(document.getElementById('rotationSpeed').value);
        rotator.style.transform = `translate(-50%, -50%) rotate(${currentRotation}deg)`;
        requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
    generateRandomSpiral();
    addLayer();
</script>
</body>
</html>
